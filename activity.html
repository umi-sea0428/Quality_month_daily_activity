<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>质量月答题活动 - 每日签到与答题</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --text: #0b0f19;
        --muted: #5b6475;
        --stroke: #e6e8ee;
        --accent: #ff7a00;
        --accent-bright: #ff8c1a;
        --accent-soft: rgba(255, 122, 0, 0.12);
        --danger: #d92d20;
        --ok: #067647;
        --shadow: 0 4px 20px rgba(255, 122, 0, 0.06);
        --shadow-hover: 0 8px 28px rgba(255, 122, 0, 0.12);
        --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-inout: cubic-bezier(0.4, 0, 0.2, 1);
        --t-fast: 140ms;
        --t-med: 220ms;
        --t-slow: 420ms;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      * {
        font-family: var(--font-sans);
      }
      body {
        margin: 0;
        font-family: var(--font-sans);
        font-size: 14px;
        line-height: 1.5;
        background: linear-gradient(160deg, rgba(255, 140, 26, 0.18) 0%, rgba(255, 122, 0, 0.08) 35%, #ffffff 70%);
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .wrap {
        width: min(980px, 100%);
      }
      .small {
        font-size: 12px;
        color: var(--muted);
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: #111827;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      header .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      header .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 6px var(--accent-soft);
        flex-shrink: 0;
      }
      header h1 {
        font-size: 22px;
        font-weight: 700;
        margin: 0;
        letter-spacing: 0.2px;
        color: var(--text);
      }
      header .small {
        margin-top: 4px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
        padding: 14px 18px 18px;
      }
      .card {
        grid-column: span 12;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 122, 0, 0.15);
        border-radius: 16px;
        padding: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        transform: translateZ(0);
        will-change: transform;
        animation: cardIn var(--t-slow) var(--ease-out) both;
        transition: transform var(--t-med) var(--ease-out), box-shadow var(--t-med) var(--ease-out), border-color var(--t-med) ease, background var(--t-med) ease;
      }
      .card:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 1);
        border-color: rgba(255, 122, 0, 0.25);
        box-shadow: var(--shadow-hover);
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 12px;
      }
      button {
        border: none;
        background: linear-gradient(180deg, var(--accent-bright) 0%, var(--accent) 100%);
        color: #ffffff;
        padding: 10px 16px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        transform: translateZ(0);
        will-change: transform;
        transition: transform var(--t-fast) var(--ease-out), box-shadow var(--t-fast) var(--ease-out), opacity var(--t-fast) ease;
        box-shadow: 0 2px 8px rgba(255, 122, 0, 0.3);
      }
      button.secondary {
        background: #ffffff;
        color: var(--accent);
        border: 1px solid rgba(255, 122, 0, 0.4);
        font-weight: 500;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      button.secondary:hover {
        background: var(--accent-soft);
        border-color: rgba(255, 122, 0, 0.5);
        box-shadow: 0 2px 10px rgba(255, 122, 0, 0.15);
      }
      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(255, 122, 0, 0.4);
      }
      button:active {
        transform: translateY(1px) scale(0.98);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      input[type="date"] {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 122, 0, 0.25);
        background: #ffffff;
        color: var(--text);
        outline: none;
        font-family: var(--font-sans);
        transition: box-shadow var(--t-fast) var(--ease-out), border-color var(--t-fast) var(--ease-inout);
      }
      input[type="date"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .msg {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
        white-space: pre-wrap;
      }
      .msg.ok {
        color: var(--ok);
      }
      .msg.err {
        color: var(--danger);
      }
      .quiz {
        margin-top: 10px;
        display: grid;
        gap: 12px;
      }
      .q {
        border: 1px solid rgba(255, 122, 0, 0.18);
        border-radius: 14px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.95);
        transform: translateZ(0);
        will-change: transform, opacity;
        animation: fadeInUp 320ms var(--ease-out) both;
      }
      .qtitle {
        font-size: 14px;
        margin: 0 0 10px;
        line-height: 1.45;
      }
      .opts {
        display: grid;
        gap: 8px;
      }
      .opt {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 8px 10px;
        border: 1px solid var(--stroke);
        border-radius: 10px;
        transform: translateZ(0);
        will-change: transform;
        transition: border-color var(--t-fast) var(--ease-inout), box-shadow var(--t-fast) var(--ease-out),
          transform var(--t-fast) var(--ease-out);
      }
      .opt:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 122, 0, 0.5);
        background: var(--accent-soft);
        box-shadow: 0 4px 12px rgba(255, 122, 0, 0.12);
      }
      .tag {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 122, 0, 0.3);
        background: var(--accent-soft);
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
      }
      .tag.accent {
        border-color: rgba(255, 122, 0, 0.5);
        background: linear-gradient(135deg, rgba(255, 140, 26, 0.2) 0%, rgba(255, 122, 0, 0.12) 100%);
        color: #b35a00;
      }
      .stat {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 12px;
      }
      @media (max-width: 820px) {
        .stat {
          grid-template-columns: 1fr;
        }
      }
      .kpi {
        border: 1px solid rgba(255, 122, 0, 0.2);
        border-radius: 14px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.95);
        transform: translateZ(0);
        will-change: transform;
        transition: transform var(--t-med) var(--ease-out), box-shadow var(--t-med) var(--ease-out), border-color var(--t-med) ease;
      }
      .kpi:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 122, 0, 0.35);
        box-shadow: 0 6px 20px rgba(255, 122, 0, 0.12);
      }
      .kpi .v {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.2px;
        color: var(--accent);
      }
      .table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }
      .table th,
      .table td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 122, 0, 0.12);
        font-size: 13px;
      }
      .table th {
        color: var(--muted);
        font-weight: 600;
      }
      .table tbody tr:hover {
        background: var(--accent-soft);
      }
      .table tbody tr {
        transform: translateZ(0);
        will-change: opacity, transform;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeInUpSoft {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .btn-loading {
        position: relative;
        color: transparent !important;
        pointer-events: none;
      }
      .btn-loading::after {
        content: "";
        position: absolute;
        inset: 0;
        margin: auto;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255,255,255,0.4);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      button.secondary.btn-loading::after {
        border-color: var(--accent-soft);
        border-top-color: var(--accent);
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(11, 15, 25, 0.4);
        backdrop-filter: blur(4px);
        z-index: 100;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .modal-overlay.show {
        display: flex;
        animation: modalFadeIn 0.2s ease both;
      }
      @keyframes modalFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .modal-box {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        max-width: 360px;
        width: 100%;
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        border: 1px solid rgba(255, 122, 0, 0.2);
        animation: modalSlideIn 0.3s var(--ease-out) both;
      }
      @keyframes modalSlideIn {
        from { opacity: 0; transform: translateY(-12px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .modal-box h3 {
        margin: 0 0 8px;
        font-size: 18px;
        color: var(--text);
      }
      .modal-box .score-line {
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
        margin: 12px 0 8px;
      }
      .modal-box .score-desc {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 20px;
      }
      .modal-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .modal-actions button {
        width: 100%;
      }
      @media (prefers-reduced-motion: reduce) {
        * {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header style="margin-bottom: 14px">
        <div>
          <div class="brand-row">
            <span class="dot" aria-hidden="true"></span>
            <h1>每日签到 & 每日答题</h1>
          </div>
          <div class="small">每天：签到 1 次（+5分），答题 2 次机会（同一套10题，按答对题数加分）</div>
        </div>
      </header>

      <div class="grid">
        <section class="card" style="animation-delay: 0ms">
          <div class="row" style="justify-content: space-between; margin-top: 0">
            <div class="row" style="margin-top: 0">
              <span class="tag accent">我的积分</span>
              <span class="small">实时统计：签到分 + 答题分</span>
            </div>
            <div class="row" style="margin-top: 0">
              <button class="secondary" id="btnRefreshPoints">刷新积分</button>
              <button class="secondary" id="btnLogout">退出登录</button>
              <a class="small" href="./index.html">返回登录页</a>
            </div>
          </div>
          <div class="stat">
            <div class="kpi">
              <div class="small">总积分</div>
              <div class="v" id="kpiPoints">0</div>
            </div>
            <div class="kpi">
              <div class="small">签到获得</div>
              <div class="v" id="kpiCheckin">0</div>
            </div>
            <div class="kpi">
              <div class="small">答题获得</div>
              <div class="v" id="kpiQuiz">0</div>
            </div>
          </div>
          <div id="pointsMsg" class="msg"></div>
        </section>

        <section class="card" style="animation-delay: 60ms">
          <div class="row" style="justify-content: space-between; margin-top: 0">
            <div class="row" style="margin-top: 0">
              <span class="tag accent">积分榜</span>
              <span class="small">按总积分排名（Top 50）</span>
            </div>
            <div class="row" style="margin-top: 0">
              <button class="secondary" id="btnRefreshBoard">刷新榜单</button>
            </div>
          </div>
          <table class="table" aria-label="leaderboard">
            <thead>
              <tr>
                <th style="width: 80px">排名</th>
                <th>用户</th>
                <th style="width: 120px">积分</th>
              </tr>
            </thead>
            <tbody id="boardBody"></tbody>
          </table>
          <div id="boardMsg" class="msg"></div>
        </section>

        <section class="card" style="animation-delay: 120ms">
          <div class="row" style="justify-content: space-between">
            <div class="row" style="margin-top: 0">
              <span class="tag accent">日期</span>
              <input id="date" type="date" />
              <button class="secondary" id="btnRefresh">刷新状态</button>
            </div>
            <div class="row" style="margin-top: 0">
              <button id="btnCheckin">今日签到</button>
            </div>
          </div>
          <div id="statusMsg" class="msg"></div>
        </section>

        <section class="card" style="animation-delay: 180ms">
          <div>
            <div class="row" style="justify-content: space-between; margin-top: 0">
              <div class="row" style="margin-top: 0">
                <span class="tag accent">每日答题</span>
                <span class="small">每天同一套 10 题，可答 2 次，积分取较高一次</span>
              </div>
              <div class="row" style="margin-top: 0">
                <button id="btnStartQuiz">开始答题</button>
                <button id="btnSubmit" disabled>提交本次答题</button>
              </div>
            </div>
            <div id="quizMsg" class="msg"></div>
            <div id="quizBox" class="quiz"></div>
        </section>
      </div>
    </div>

    <div class="modal-overlay" id="scoreModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="scoreModalTitle">
      <div class="modal-box">
        <h3 id="scoreModalTitle">答题结果</h3>
        <div class="score-line" id="scoreModalScore">0 / 10</div>
        <div class="score-desc" id="scoreModalDesc"></div>
        <div class="modal-actions" id="scoreModalActions">
          <button id="scoreModalAgain">再次答题</button>
          <button class="secondary" id="scoreModalClose">退出答题</button>
        </div>
      </div>
    </div>

    <script>
      const tokenKey = "authToken";
      function getToken() {
        return localStorage.getItem(tokenKey) || "";
      }
      function setToken(t) {
        if (t) localStorage.setItem(tokenKey, t);
        else localStorage.removeItem(tokenKey);
      }
      const API_BASE = localStorage.getItem("apiBase") || "http://localhost:3001";

      function setMsg(id, text, kind) {
        const el = document.getElementById(id);
        el.className = "msg" + (kind ? " " + kind : "");
        el.textContent = text || "";
      }

      async function apiPost(path, body) {
        const t = getToken();
        if (!t) throw new Error("请先登录（返回登录页）");
        const res = await fetch(API_BASE + path, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + t },
          body: JSON.stringify(body || {}),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) throw new Error(data.message || ("HTTP " + res.status));
        return data;
      }
      async function apiGet(path) {
        const t = getToken();
        if (!t) throw new Error("请先登录（返回登录页）");
        const res = await fetch(API_BASE + path, {
          headers: { Authorization: "Bearer " + t },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) throw new Error(data.message || ("HTTP " + res.status));
        return data;
      }

      function todayYmd() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      const dateInput = document.getElementById("date");
      dateInput.value = todayYmd();

      let currentAttempt = null;
      let currentQuestions = [];
      const answers = {}; // qid -> A/B/C/D

      function renderQuiz() {
        const box = document.getElementById("quizBox");
        box.innerHTML = "";
        for (const q of currentQuestions) {
          const el = document.createElement("div");
          el.className = "q";
          el.innerHTML = `
            <div class="row" style="margin-top:0; justify-content: space-between">
              <div class="tag">${q.topic ? String(q.topic) : "题目"}</div>
              <div class="small">ID: <code>${q.id}</code></div>
            </div>
            <p class="qtitle">${escapeHtml(q.question)}</p>
            <div class="opts">
              ${optHtml(q.id, "A", q.option_a)}
              ${optHtml(q.id, "B", q.option_b)}
              ${q.option_c ? optHtml(q.id, "C", q.option_c) : ""}
              ${q.option_d ? optHtml(q.id, "D", q.option_d) : ""}
            </div>
          `;
          box.appendChild(el);
        }
        document.getElementById("btnSubmit").disabled = !(currentAttempt && currentQuestions.length);
      }

      function showScoreModal(score, total, points, attempt) {
        const overlay = document.getElementById("scoreModal");
        const descEl = document.getElementById("scoreModalDesc");
        const againBtn = document.getElementById("scoreModalAgain");
        const closeBtn = document.getElementById("scoreModalClose");
        document.getElementById("scoreModalScore").textContent = `本次得分：${score} / ${total}`;
        if (attempt === 1) {
          descEl.textContent = "今日还有一次答题机会。选择「再次答题」将按两次中较高一次计分；选择「退出答题」则按当前分数计分。";
          againBtn.style.display = "";
          closeBtn.textContent = "退出答题";
          closeBtn.style.display = "";
        } else {
          descEl.textContent = "今日答题机会已用完。积分取两次中较高一次，当前积分 " + points + "。";
          againBtn.style.display = "none";
          closeBtn.textContent = "完成";
          closeBtn.style.display = "";
        }
        overlay.classList.add("show");
        overlay.setAttribute("aria-hidden", "false");
      }
      function hideScoreModal() {
        const overlay = document.getElementById("scoreModal");
        overlay.classList.remove("show");
        overlay.setAttribute("aria-hidden", "true");
      }

      function optHtml(qid, letter, text) {
        const name = "q_" + qid;
        const checked = answers[String(qid)] === letter ? "checked" : "";
        return `
          <label class="opt">
            <input type="radio" name="${name}" value="${letter}" ${checked} />
            <span class="tag accent">${letter}</span>
            <span>${escapeHtml(text)}</span>
          </label>
        `;
      }

      function escapeHtml(s) {
        return String(s || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      document.getElementById("quizBox").addEventListener("change", (e) => {
        const t = e.target;
        if (!(t && t.matches("input[type=radio]"))) return;
        const name = t.name || "";
        const qid = name.replace("q_", "");
        answers[String(qid)] = String(t.value || "").toUpperCase();
      });

      async function refreshStatus() {
        const btn = document.getElementById("btnRefresh");
        btn.classList.add("btn-loading");
        setMsg("statusMsg", "加载状态中…");
        try {
          const ymd = dateInput.value;
          const r = await apiGet(`/api/activity/status?date=${encodeURIComponent(ymd)}`);
          const lines = [];
          lines.push(`日期：${r.date}`);
          lines.push(`签到：${r.checkinDone ? "已签到" : "未签到"}`);
          lines.push(`答题次数：已使用 ${r.attemptsUsed}/2`);
          if (r.attempts["1"]) lines.push(`- 第1次：${r.attempts["1"].score} 分（${r.attempts["1"].at}）`);
          if (r.attempts["2"]) lines.push(`- 第2次：${r.attempts["2"].score} 分（${r.attempts["2"].at}）`);
          setMsg("statusMsg", lines.join("\n"), "ok");
          const btnCheckin = document.getElementById("btnCheckin");
          btnCheckin.disabled = r.checkinDone;
          btnCheckin.textContent = r.checkinDone ? "已签到，请再接再厉" : "今日签到";
        } catch (e) {
          setMsg("statusMsg", "加载失败：" + e.message, "err");
        } finally {
          btn.classList.remove("btn-loading");
        }
      }

      function animateNumber(el, to) {
        const from = Number(el.textContent || "0") || 0;
        const start = performance.now();
        const dur = 560;
        function tick(now) {
          const t = Math.min(1, (now - start) / dur);
          const eased = 1 - Math.pow(1 - t, 3.2);
          const current = from + (to - from) * eased;
          el.textContent = String(Math.round(current));
          if (t < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      async function refreshPoints() {
        const btn = document.getElementById("btnRefreshPoints");
        btn.classList.add("btn-loading");
        setMsg("pointsMsg", "加载积分中…");
        try {
          const r = await apiGet(`/api/activity/points`);
          animateNumber(document.getElementById("kpiPoints"), Number(r.points || 0));
          animateNumber(document.getElementById("kpiCheckin"), Number(r.checkins || 0) * 5);
          animateNumber(document.getElementById("kpiQuiz"), Number(r.quizScore || 0));
          setMsg("pointsMsg", "积分已更新", "ok");
        } catch (e) {
          setMsg("pointsMsg", "加载失败：" + e.message, "err");
        } finally {
          btn.classList.remove("btn-loading");
        }
      }

      async function refreshBoard() {
        const btn = document.getElementById("btnRefreshBoard");
        btn.classList.add("btn-loading");
        setMsg("boardMsg", "加载榜单中…");
        const body = document.getElementById("boardBody");
        body.innerHTML = "";
        try {
          const r = await apiGet(`/api/leaderboard`);
          const rows = r.rows || [];
          rows.forEach((it, idx) => {
            const tr = document.createElement("tr");
            tr.style.animation = "fadeInUpSoft 320ms cubic-bezier(0.22, 1, 0.36, 1) both";
            tr.style.animationDelay = `${Math.min(400, idx * 22)}ms`;
            tr.innerHTML = `<td>${idx + 1}</td><td>${escapeHtml(it.username)}</td><td><b>${Number(it.points || 0)}</b></td>`;
            body.appendChild(tr);
          });
          setMsg("boardMsg", rows.length ? "榜单已更新" : "暂无数据", "ok");
        } catch (e) {
          setMsg("boardMsg", "加载失败：" + e.message, "err");
        } finally {
          btn.classList.remove("btn-loading");
        }
      }

      async function checkin() {
        setMsg("statusMsg", "签到中…");
        try {
          const ymd = dateInput.value;
          const r = await apiPost("/api/activity/checkin", { date: ymd });
          setMsg("statusMsg", `日期：${r.date}\n签到：已签到`, "ok");
          await refreshStatus();
          await refreshPoints();
          await refreshBoard();
        } catch (e) {
          setMsg("statusMsg", "签到失败：" + e.message, "err");
        }
      }

      async function loadQuiz(attempt) {
        setMsg("quizMsg", "加载题目中…");
        try {
          const ymd = dateInput.value;
          const r = await apiGet(`/api/activity/quiz?date=${encodeURIComponent(ymd)}&attempt=${attempt}`);
          currentAttempt = attempt;
          currentQuestions = r.questions || [];
          for (const q of currentQuestions) delete answers[String(q.id)];
          renderQuiz();
          setMsg("quizMsg", attempt === 1 ? `已加载题目（${currentQuestions.length}题），答完可提交` : `已加载第二次题目（${currentQuestions.length}题）`, "ok");
        } catch (e) {
          currentAttempt = null;
          currentQuestions = [];
          renderQuiz();
          if (e.message && e.message.includes("already used") && attempt === 1) {
            setMsg("quizMsg", "当日答题已完成。", "ok");
            return;
          }
          setMsg("quizMsg", "加载失败：" + e.message, "err");
        }
      }

      async function submitQuiz() {
        setMsg("quizMsg", "提交中…");
        try {
          const ymd = dateInput.value;
          const payload = {
            date: ymd,
            attempt: currentAttempt,
            answers: { ...answers },
          };
          const r = await apiPost("/api/activity/quiz/submit", payload);
          const submittedAttempt = currentAttempt;
          currentAttempt = null;
          currentQuestions = [];
          renderQuiz();
          setMsg("quizMsg", "");
          await refreshStatus();
          await refreshPoints();
          await refreshBoard();
          showScoreModal(Number(r.score || 0), Number(r.total || 10), Number(r.points || 0), submittedAttempt);
        } catch (e) {
          setMsg("quizMsg", "提交失败：" + e.message, "err");
        }
      }

      document.getElementById("btnRefresh").addEventListener("click", refreshStatus);
      document.getElementById("btnCheckin").addEventListener("click", checkin);
      document.getElementById("btnStartQuiz").addEventListener("click", () => loadQuiz(1));
      document.getElementById("btnSubmit").addEventListener("click", submitQuiz);

      document.getElementById("scoreModalAgain").addEventListener("click", () => {
        hideScoreModal();
        loadQuiz(2);
      });
      document.getElementById("scoreModalClose").addEventListener("click", () => {
        hideScoreModal();
        setMsg("quizMsg", "已结束。积分按当前分数计入。", "ok");
      });
      document.getElementById("scoreModal").addEventListener("click", (e) => {
        if (e.target.id === "scoreModal") hideScoreModal();
      });
      document.getElementById("btnRefreshPoints").addEventListener("click", refreshPoints);
      document.getElementById("btnRefreshBoard").addEventListener("click", refreshBoard);
      document.getElementById("btnLogout").addEventListener("click", () => {
        setToken("");
        window.location.href = "./index.html";
      });

      refreshStatus();
      refreshPoints();
      refreshBoard();
    </script>
  </body>
</html>
